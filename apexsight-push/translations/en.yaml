configuration:
  admin_username:
    name: Admin username
    description: Username for the relay web GUI (OPEN WEB UI) login.
  admin_password:
    name: Admin password
    description: >-
      Password for the web GUI login. Pick a long one — it protects the page
      where you upload your Apple APNs key.
  api_token:
    name: App API token
    description: >-
      Shared secret the ApexSight app + bridge use to authenticate to the relay.
      Leave blank to have the add-on generate one (shown on the web GUI
      dashboard), or set your own. Anyone with this token can send pushes — keep
      it private.
  pairing_code:
    name: Pairing code
    description: >-
      Your household code — it must match the code shown in the app
      (Settings → Instant Push). There is no shared default; set your own.
  frigate_base_url:
    name: Frigate URL (for the snapshot)
    description: >-
      A URL your phone can reach Frigate at, used to load the notification
      image/GIF — e.g. https://frigate.yourdomain.com. Leave blank for text-only.
  alerts_only:
    name: Alerts only
    description: On = only Frigate "alert" reviews. Off = also send detections.
  secure_cookies:
    name: Secure admin cookies
    description: >-
      Mark the admin login cookie HTTPS-only. Turn ON if you reach the web GUI
      only over HTTPS (through your tunnel). Leave OFF if you use the local
      "OPEN WEB UI" button, which is plain HTTP.
  topic:
    name: MQTT topic
    description: Frigate review topic. Leave as frigate/reviews unless you changed it.
  mqtt_host:
    name: MQTT host (optional)
    description: Leave blank to use the Home Assistant broker automatically.
  mqtt_port:
    name: MQTT port (optional)
    description: Leave 0 to use the Home Assistant broker automatically.
  mqtt_user:
    name: MQTT username (optional)
    description: Leave blank to use the Home Assistant broker automatically.
  mqtt_password:
    name: MQTT password (optional)
    description: Leave blank to use the Home Assistant broker automatically.
