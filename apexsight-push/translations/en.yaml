configuration:
  admin_username:
    name: Admin username
    description: Username for the relay web GUI (OPEN WEB UI) login.
  admin_password:
    name: Admin password
    description: >-
      Password for the web GUI login. Pick a long one — it protects the page
      where you upload your Apple APNs key.
  pairing_code:
    name: Pairing code
    description: >-
      Pre-filled with the shared household code. Leave as-is for a shared-camera
      setup; it must match the code shown in the app (Settings → Instant Push).
  frigate_base_url:
    name: Frigate URL (for the snapshot)
    description: >-
      A URL your phone can reach Frigate at, used to load the notification
      image/GIF — e.g. https://frigate.yourdomain.com. Leave blank for text-only.
  alerts_only:
    name: Alerts only
    description: On = only Frigate "alert" reviews. Off = also send detections.
  topic:
    name: MQTT topic
    description: Frigate review topic. Leave as frigate/reviews unless you changed it.
  doorbell_lead_ms:
    name: Doorbell warm-up lead (ms)
    description: >-
      Silence played to the doorbell speaker BEFORE your words so it's fully awake
      — the Aqara opens its speaker a beat after the talk session starts. Raise it
      if the FIRST word is still clipped; lower it if there's too much dead air.
      Default 800.
  doorbell_tail_ms:
    name: Doorbell drain tail (ms)
    description: >-
      Silence played AFTER your words so the speaker finishes the last one before
      the session closes. Raise it if the END is clipped. Default 500.
  doorbell_drain_ms:
    name: Doorbell close pause (ms)
    description: >-
      Extra pause before hanging up the talk session, so the speaker buffer fully
      empties. Default 300.
  doorbell_ring_debounce:
    name: Doorbell ring debounce (seconds)
    description: >-
      A visitor mashing the doorbell rings your phones ONCE — re-presses within this many
      seconds are ignored, so the call doesn't keep restarting. 0 disables. Default 30.
  mqtt_host:
    name: MQTT host (optional)
    description: Leave blank to use the Home Assistant broker automatically.
  mqtt_port:
    name: MQTT port (optional)
    description: Leave 0 to use the Home Assistant broker automatically.
  mqtt_user:
    name: MQTT username (optional)
    description: Leave blank to use the Home Assistant broker automatically.
  mqtt_password:
    name: MQTT password (optional)
    description: Leave blank to use the Home Assistant broker automatically.
