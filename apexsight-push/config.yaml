name: ApexSight Push
version: "1.11.0"
slug: apexsight_push
description: All-in-one APNs relay (web GUI) + Frigate alert bridge for instant iOS notifications.
url: https://github.com/btoth525/apexsight-ha-addon/tree/main/apexsight-push
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
# Lets the add-on call HA's TTS (tts_get_url) so `apexsight/doorbell/say` can speak text at the door.
homeassistant_api: true
# Pulls MQTT connection details automatically from the Home Assistant broker.
services:
  - mqtt:need
# Publishes the relay so your Cloudflare Tunnel / proxy can reach it.
ports:
  "3421/tcp": 3421
ports_description:
  "3421/tcp": Relay API + web GUI — point your Cloudflare Tunnel / proxy at this host port
# "OPEN WEB UI" button → the admin page on the mapped host port.
webui: "http://[HOST]:[PORT:3421]/admin"
options:
  admin_username: admin
  admin_password: ""
  pairing_code: "APEX-PLEX-5250"
  frigate_base_url: ""
  alerts_only: true
  topic: "frigate/reviews"
  doorbell_ip: ""
  doorbell_gain: "3.0"
  doorbell_tts_engine: "tts.piper"
  doorbell_lead_ms: 800
  doorbell_tail_ms: 500
  doorbell_drain_ms: 300
  doorbell_ring_debounce: 30
  mqtt_host: ""
  mqtt_port: 0
  mqtt_user: ""
  mqtt_password: ""
  turn_key_id: ""
  turn_api_token: ""
schema:
  admin_username: str
  admin_password: password
  pairing_code: "match(^APEX-[A-Z0-9]{4}-[A-Z0-9]{4}$)"
  frigate_base_url: url?
  alerts_only: bool
  topic: str
  doorbell_ip: str?
  doorbell_gain: str?
  doorbell_tts_engine: str?
  doorbell_lead_ms: int(0,5000)?
  doorbell_tail_ms: int(0,5000)?
  doorbell_drain_ms: int(0,3000)?
  doorbell_ring_debounce: int(0,120)?
  mqtt_host: str?
  mqtt_port: int?
  mqtt_user: str?
  mqtt_password: password?
  turn_key_id: str?
  turn_api_token: password?
