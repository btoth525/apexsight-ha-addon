<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ApexSight Push Relay</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span> ApexSight <span class="muted">Push Relay</span>
    </div>
    {% if request.session.get('admin') %}
    <nav>
      <a href="/admin">Dashboard</a>
      <a href="/admin/settings">Settings</a>
      <a href="/admin/devices">Devices</a>
      <a href="/admin/logout" class="muted">Sign out</a>
    </nav>
    {% endif %}
  </header>
  <main class="wrap">
    {% if flash %}<div class="flash">{{ flash }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
  <footer class="foot muted">
    Secrets live only in this server's data volume — never in the app or the repo.
  </footer>
</body>
</html>
