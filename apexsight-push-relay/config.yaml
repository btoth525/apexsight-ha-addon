name: ApexSight Push Relay
version: "1.0.0"
slug: apexsight_push_relay
description: Self-hosted APNs push relay + web GUI for ApexSight instant notifications.
url: https://github.com/btoth525/apexsight-ha-addon/tree/main/apexsight-push-relay
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
# Publishes the relay on the host so your Cloudflare Tunnel / reverse proxy can
# reach it. Change the host port in the add-on's Network section if 3421 is taken.
ports:
  "3421/tcp": 3421
ports_description:
  "3421/tcp": Relay API + web GUI — point your Cloudflare Tunnel / proxy at this host port
# Adds the "OPEN WEB UI" button → opens the admin page on the mapped host port.
webui: "http://[HOST]:[PORT:3421]/admin"
options:
  admin_username: admin
  admin_password: ""
schema:
  admin_username: str
  admin_password: password
