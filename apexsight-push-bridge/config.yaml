name: ApexSight Push Bridge
version: "1.1.0"
slug: apexsight_push_bridge
description: Forwards Frigate alerts to your ApexSight push relay for instant iOS notifications.
url: https://github.com/btoth525/apexsight-ha-addon/tree/main/apexsight-push-bridge
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
# Pulls MQTT connection details automatically from the Home Assistant broker.
services:
  - mqtt:need
# Defaults are pre-filled so setup is: add repo → install → set the pairing code +
# Frigate URL in the Configuration tab → Start. The relay URL is already correct.
options:
  relay_url: "https://relay.plexserver525.com"
  pairing_code: "APEX-PLEX-5250"
  frigate_base_url: ""
  alerts_only: true
  topic: "frigate/reviews"
  mqtt_host: ""
  mqtt_port: 0
  mqtt_user: ""
  mqtt_password: ""
schema:
  relay_url: url
  pairing_code: "match(^APEX-[A-Z0-9]{4}-[A-Z0-9]{4}$)"
  frigate_base_url: url?
  alerts_only: bool
  topic: str
  mqtt_host: str?
  mqtt_port: int?
  mqtt_user: str?
  mqtt_password: password?
